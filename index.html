<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bliblioteca de Ícones</title>
    <link rel="icon" href="ico/favicon.ico" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Bliblioteca de Ícones</h1>

      <label class="sr-only" for="searchInput">Pesquisar emoji ou ícone</label>
      <input
        id="searchInput"
        type="search"
        placeholder="Pesquisar emoji ou ícone..."
        autocomplete="off"
      />

      <div class="tabs" role="tablist" aria-label="Tipo de item">
        <button class="tab is-active" type="button" data-tab="icons" role="tab" aria-selected="true">
          Ícones
        </button>
        <button class="tab" type="button" data-tab="emojis" role="tab" aria-selected="false">
          Emojis
        </button>
      </div>

      <section id="grid" class="grid" aria-live="polite"></section>
      <p id="emptyState" class="empty-state" hidden>Nenhum resultado encontrado.</p>
    </main>

    <script src="script.js"></script>
  </body>
</html>
