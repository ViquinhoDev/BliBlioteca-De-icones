<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca de Ícones</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Cinzel:wght@600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f6f8fc;
  --card:#ffffff;
  --text:#222;
  --muted:#64748b;
  --border:#e5e7eb;
  --primary:#2563eb;
  --success:#22c55e;
  --scroll-track:#e2e8f0;
  --scroll-thumb:#94a3b8;
  --scroll-thumb-hover:#64748b;
}

body.dark{
  --bg:#1a1b23;
  --card:#232634;
  --text:#e6e8f0;
  --muted:#9aa3bb;
  --border:#35384a;
  --primary:#7b7ff6;
  --success:#2dbf6b;
  --scroll-track:#1f2230;
  --scroll-thumb:#4f546b;
  --scroll-thumb-hover:#676d88;
}

*{ margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }

body{
  background:var(--bg);
  color:var(--text);
  padding:40px 20px;
  transition:.3s;
  scrollbar-color:var(--scroll-thumb) var(--scroll-track);
  scrollbar-width:thin;
}

::-webkit-scrollbar{ width:12px; }
::-webkit-scrollbar-track{ background:var(--scroll-track); border-radius:20px; }
::-webkit-scrollbar-thumb{
  background:linear-gradient(180deg,var(--scroll-thumb),var(--scroll-thumb-hover));
  border-radius:20px;
  border:2px solid var(--scroll-track);
}
::-webkit-scrollbar-thumb:hover{ background:linear-gradient(180deg,var(--scroll-thumb-hover),var(--primary)); }

.container{ max-width:1200px; margin:auto; }

h1{
  text-align:center;
  font-size:36px;
  font-weight:800;
  margin-bottom:30px;
  font-family:'Cinzel','Inter',serif;
  letter-spacing:.04em;
}

.top-bar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; gap:14px; }

.toggle{
  cursor:pointer;
  padding:8px 14px;
  border-radius:10px;
  background:var(--card);
  border:1px solid var(--border);
  transition:.3s;
  display:flex;
  align-items:center;
  gap:8px;
  color:var(--text);
}

.toggle svg{ width:18px; height:18px; }

.search-box{ position:relative; margin-bottom:25px; }
.search-box input{
  width:100%;
  padding:14px 50px 14px 15px;
  border-radius:14px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
  font-size:16px;
}

.search-box .search-icon{
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  width:20px;
  height:20px;
  color:var(--text);
  opacity:.72;
  pointer-events:none;
}

.tabs{ display:flex; gap:12px; margin-bottom:20px; }
.tab{ padding:10px 22px; border-radius:12px; background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600; transition:.3s; }
.tab.active{ background:var(--primary); color:white; }

.counter{ color:var(--muted); margin-bottom:22px; font-size:14px; }

.grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(100px,1fr)); gap:18px; }
.item{
  background:var(--card);
  border-radius:16px;
  padding:14px 10px;
  text-align:center;
  cursor:pointer;
  border:1px solid var(--border);
  transition:.3s;
  min-height:98px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:8px;
}
.item:hover{ transform:scale(1.05); border-color:var(--primary); }
.item.copied{ background:var(--success); color:white; }
.item svg{ width:28px; height:28px; }
.item .label{ font-size:12px; color:var(--muted); text-transform:capitalize; line-height:1.2; }
.item.copied .label{ color:white; }
</style>
</head>
<body>

<div class="container">
  <div class="top-bar">
    <h1>Biblioteca de Ícones</h1>
    <button class="toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Alternar tema">
      <span id="themeIcon"></span>
      <span id="themeText">Tema claro</span>
    </button>
  </div>

  <div class="search-box">
    <input type="text" id="search" placeholder="Pesquisar por nome (ex: user, cloud, estrela, fogo)...">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M11 4a7 7 0 1 0 4.62 12.26l4.06 4.06a1 1 0 1 0 1.42-1.42l-4.06-4.06A7 7 0 0 0 11 4Zm0 2a5 5 0 1 1 0 10 5 5 0 0 1 0-10Z" fill="currentColor"/>
    </svg>
  </div>

  <div class="tabs">
    <div class="tab active" data-type="icons">Ícones</div>
    <div class="tab" data-type="emojis">Emojis</div>
  </div>

  <p class="counter" id="counter"></p>
  <div class="grid" id="grid"></div>
</div>

<script>
const grid = document.getElementById("grid");
const searchInput = document.getElementById("search");
const tabs = document.querySelectorAll(".tab");
const counter = document.getElementById("counter");
const themeText = document.getElementById("themeText");
const themeIcon = document.getElementById("themeIcon");

let currentType = "icons";
let icons = [];
let emojis = [];

// Ícones do tema
const sunIcon = `<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 1v3M12 20v3M1 12h3M20 12h3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>`;
const moonIcon = `<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M15 2a9 9 0 1 0 7 14 8 8 0 1 1-7-14z"/></svg>`;

// Função para normalizar texto (remover acentos e minusculas)
function normalized(text){
  return text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

// Filtrar ícones ou emojis
function matchesFilter(item, filter){
  if(!filter) return true;
  if(item.char && item.char.includes(filter)) return true;
  const haystack = [item.name, ...(item.tags||[])].join(" ");
  return normalized(haystack).includes(filter);
}

// Atualiza UI do tema
function updateThemeUi(){
  const dark = document.body.classList.contains("dark");
  themeText.textContent = dark ? "Tema escuro" : "Tema claro";
  themeIcon.innerHTML = dark ? moonIcon : sunIcon;
}

// Renderiza ícones ou emojis
function render(){
  grid.innerHTML = "";
  const filter = normalized(searchInput.value.trim());
  const source = currentType === "icons" ? icons : emojis;
  const filtered = source.filter(item => matchesFilter(item, filter));

  counter.textContent = `${filtered.length} resultado(s) em ${currentType === "icons" ? "ícones" : "emojis"}`;

  filtered.forEach(item => {
    const div = document.createElement("div");
    div.className = "item";

    if(currentType === "icons"){
      div.innerHTML = `${item.svg}<span class="label">${item.name}</span>`;
    } else {
      div.innerHTML = `<span style="font-size:28px;line-height:1">${item.char}</span><span class="label">${item.name}</span>`;
    }

    div.onclick = () => {
      const text = currentType === "icons" ? item.svg : item.char;
      navigator.clipboard.writeText(text);
      div.classList.add("copied");
      setTimeout(() => div.classList.remove("copied"), 800);
    };

    grid.appendChild(div);
  });
}

// Alternar abas
tabs.forEach(tab => {
  tab.onclick = () => {
    tabs.forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    currentType = tab.dataset.type;
    render();
  };
});

// Input de pesquisa
searchInput.addEventListener("input", render);

// Alternar tema
function toggleTheme(){
  document.body.classList.toggle("dark");
  updateThemeUi();
}

// Carregar JSON de ícones e emojis
async function loadData(){
  try {
    const iconsResp = await fetch("icons.json");
    icons = await iconsResp.json();

    const emojisResp = await fetch("emojis.json");
    emojis = await emojisResp.json();

    render();
  } catch(e){
    console.error("Erro ao carregar dados:", e);
    grid.innerHTML = "<p style='color:red;text-align:center'>Erro ao carregar os dados!</p>";
  }
}

// Inicialização
updateThemeUi();
loadData();
</script>

</body>
</html>
